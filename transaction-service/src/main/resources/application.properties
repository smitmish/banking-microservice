spring.application.name=transaction-service
server.port=8082

# Connects to the Docker PostgreSQL container instance on port 5432
spring.datasource.url=jdbc:postgresql://localhost:5432/bank_transactions
spring.datasource.username=tx_user
spring.datasource.password=tx_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kafka Consumer Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=banking-group
# Forces the consumer group to read historical messages from the beginning if it starts fresh
spring.kafka.consumer.auto-offset-reset=earliest